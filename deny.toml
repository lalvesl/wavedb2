[advisories]
version = 2
# Deny crates with known CVEs.
ignore = [
  "RUSTSEC-2023-0089", # atomic-polyfill unmaintained
]

[licenses]
version = 2
# Licenses explicitly allowed. Anything else triggers a warning or error.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Warn on duplicate versions of the same crate; exact duplicates are fine.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
# Only allow dependencies from crates.io.
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
