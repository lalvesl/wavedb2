name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Format + Clippy + Docs ──────────────────────────────────────────────────
  check:
    name: check (fmt · clippy · doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            cargo-check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
            cargo-check-${{ runner.os }}-

      - name: fmt
        run: nix develop --command cargo fmt --all --check

      - name: clippy
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

      - name: doc
        run: nix develop --command cargo doc --workspace --no-deps

  # ── Unit + integration tests — Linux (Nix) ────────────────────────────────
  test-linux:
    name: test (ubuntu · nix)
    needs: [check, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-test-Linux-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            cargo-test-Linux-${{ hashFiles('**/Cargo.lock') }}
            cargo-test-Linux-

      - name: unit tests
        run: nix develop --command cargo test --workspace

      - name: doc tests
        run: nix develop --command cargo test --workspace --doc

  # ── Unit + integration tests — macOS (native) ─────────────────────────────
  test-macos:
    name: test (macos · native)
    needs: [check, audit]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Native toolchain: reads channel/components/targets from rust-toolchain.toml.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos

      - name: unit tests
        run: cargo test --workspace

      - name: doc tests
        run: cargo test --workspace --doc

  # ── Unit + integration tests — Windows (native) ───────────────────────────
  test-windows:
    name: test (windows · native)
    needs: [check, audit]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows

      - name: unit tests
        run: cargo test --workspace

      - name: doc tests
        run: cargo test --workspace --doc

  # ── End-to-end tests (nextest) ──────────────────────────────────────────────
  e2e:
    name: e2e (nextest)
    needs: [check, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-e2e-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            cargo-e2e-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
            cargo-e2e-${{ runner.os }}-

      - name: nextest
        run: nix develop --command cargo nextest run --workspace --tests --release

  # ── WASM build ──────────────────────────────────────────────────────────────
  wasm:
    name: wasm (wasm-bindgen)
    needs: [check, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: build wasm
        run: nix build .#wasm

      - uses: actions/upload-artifact@v4
        with:
          name: wavedb-wasm-${{ github.sha }}
          path: result/
          if-no-files-found: error

  # ── Benchmarks (advisory, PR only) ─────────────────────────────────────────
  bench:
    name: bench (criterion)
    needs: [check, audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-bench-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            cargo-bench-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
            cargo-bench-${{ runner.os }}-

      - name: run benchmarks
        run: nix develop --command cargo bench --workspace -- --save-baseline pr

      - uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ github.sha }}
          path: target/criterion
          if-no-files-found: warn

  # ── Dependency audit ────────────────────────────────────────────────────────
  audit:
    name: audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: cargo deny check
        run: nix develop --command cargo deny check
